name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  actions: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci-pipeline:
    env:
      HAS_DB_SECRETS: ${{ secrets.ASTRO_DB_APP_TOKEN_READONLY != '' }}
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}

    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: "10"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Astro Sync
        run: pnpm run sync

      - name: Biome linting
        run: pnpm run lint

      - name: Astro check
        run: pnpm run check

      - name: DB check
        if: env.HAS_DB_SECRETS == 'true'
        run: pnpm run db:check

      - name: TypeScript type checking
        run: pnpm run typecheck

      - name: Run unit tests
        run: pnpm run test

      - name: Compiling test
        if: env.HAS_DB_SECRETS == 'true'
        shell: bash
        run: pnpm run build
        env:
          REDIS_URL: ${{ secrets.REDIS_URL }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DATABASE_TOKEN: ${{ secrets.DATABASE_TOKEN_READONLY }}
