name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  actions: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci-pipeline:
    env:
      HAS_DB_SECRETS: ${{ secrets.CLOUDFLARE_D1_TOKEN != '' }}

    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: "10"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync TS types
        run: pnpm wrangler types && pnpm astro sync

      - name: Biome linting
        run: pnpm biome lint

      - name: Astro check
        run: pnpm astro check

      - name: TypeScript type checking
        run: pnpm tsc --noEmit

      - name: Drizzle DB generate
        run: pnpm drizzle-kit generate

      - name: Verify if schema is up to date
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "::error::Schema changes detected but not committed."
            git status --porcelain
            exit 1
          fi

      - name: Drizzle DB check
        run: pnpm drizzle-kit check

      - name: Drizzle DB check
        if: env.HAS_DB_SECRETS == 'true'
        run: pnpm drizzle-kit push --config=drizzle.config.prod.ts --strict --verbose
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_DATABASE_ID: ${{ secrets.CLOUDFLARE_DATABASE_ID }}
          CLOUDFLARE_D1_TOKEN: ${{ secrets.CLOUDFLARE_D1_TOKEN }}

      - name: Run unit tests
        run: pnpm vitest run --passWithNoTests

      - name: Compiling test
        run: pnpm astro build
