name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  actions: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci-pipeline:
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}
      REDIS_URL: ${{ secrets.REDIS_URL_READONLY }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DATABASE_TOKEN: ${{ secrets.DATABASE_TOKEN_READONLY }}

    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: "10"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Astro Sync
        run: pnpm run sync

      - name: Biome linting
        run: pnpm run lint

      - name: Astro check
        run: pnpm run check

      - name: DB check
        if: env.HAS_DB_SECRETS == 'true'
        run: pnpm run db:check

      - name: Debug Environment Variable Presence
        run: |
          if [ -z "${{ env.DATABASE_URL }}" ]; then
            echo "❌ DATABASE_URL is empty at the workflow layer!"
          else
            echo "✅ DATABASE_URL is safely populated in the runner."
          fi

      - name: TypeScript type checking
        run: pnpm run typecheck

      - name: Run unit tests
        if: env.DATABASE_URL != ''
        run: pnpm run test

      - name: Compiling test
        if: env.DATABASE_URL != ''
        run: pnpm run build
